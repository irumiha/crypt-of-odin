<!doctype html>
<html lang="en-us">
<head>
	<meta charset="utf-8">
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

	<title>Crypt of Odin</title>
	<meta name="title" content="Crypt of Odin">
	<meta name="description" content="The book game, compiled to WebAssembly">
	<meta name="viewport" content="width=device-width">

	<style>
		body {
			margin: 0;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			overflow: hidden;
			background: black;          /* the letterbox, page edition */
		}
		canvas.game_canvas {
			border: 0;
			background-color: black;
			image-rendering: pixelated; /* crisp texels when the page scales us */
			/* !important so this outranks the inline style emscripten's
			   GLFW shim writes during init; fit() below sets the
			   variables. */
			width: var(--game-w, 800px) !important;
			height: var(--game-h, 450px) !important;
		}
	</style>
</head>
<body>
	<canvas class="game_canvas" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1" onmousedown="event.target.focus()" onkeydown="event.preventDefault()"></canvas>
	<script type="text/javascript" src="odin.js"></script>
	<script>
		// The same presentation rule the game applies inside its frame
		// (Chapter 12), done in the page's terms: the canvas keeps its
		// fixed 800x450 framebuffer, and CSS displays it at the largest
		// INTEGER scale in device pixels that fits the browser window,
		// centered. Fractional scales smear pixel art; integers keep
		// texels square.
		function fit() {
			var dpr = window.devicePixelRatio || 1;
			var s = Math.max(1, Math.floor(Math.min(
				window.innerWidth*dpr/800, window.innerHeight*dpr/450)));
			var root = document.documentElement.style;
			root.setProperty('--game-w', (800*s/dpr) + 'px');
			root.setProperty('--game-h', (450*s/dpr) + 'px');
		}
		window.addEventListener('resize', fit);
		fit();

		// Browsers keep audio muted until a user gesture, and raylib's
		// audio glue (miniaudio) only unmutes on click/touch. Our title
		// screen says "press SPACE", so keys must count too: a trusted
		// keydown carries the same user-activation, and miniaudio leaves
		// its unlock function on the window for exactly this poke.
		document.addEventListener('keydown', function kick() {
			if (window.miniaudio && miniaudio.unlock) {
				miniaudio.unlock();
				document.removeEventListener('keydown', kick);
			}
		});

		var odinMemoryInterface = new odin.WasmMemoryInterface();
		odinMemoryInterface.setIntSize(4);
		var odinImports = odin.setupDefaultImports(odinMemoryInterface);

		// The Module is used as configuration for emscripten.
		var Module = {
			// This is called by emscripten when it starts up.
			instantiateWasm: (imports, successCallback) => {
				const newImports = {
					...odinImports,
					...imports
				}

				return WebAssembly.instantiateStreaming(fetch("index.wasm"), newImports).then(function(output) {
					var e = output.instance.exports;
					odinMemoryInterface.setExports(e);
					odinMemoryInterface.setMemory(e.memory);
					return successCallback(output.instance);
				});
			},
			// This happens a bit after `instantiateWasm`, when everything is
			// done setting up. At that point we can run code.
			onRuntimeInitialized: () => {
				var e = wasmExports;

				// Calls any procedure marked with @init
				e._start();

				// See src/main_web/main_web.odin for main_start,
				// main_update and main_end.
				e.main_start();

				function send_resize() {
					var canvas = document.getElementById('canvas');
					e.web_window_size_changed(canvas.width, canvas.height);
				}

				window.addEventListener('resize', function(event) {
					send_resize();
				}, true);

				// This can probably be done better: Ideally we'd feed the
				// initial size to `main_start`. But there seems to be a
				// race condition. `canvas` doesn't have it's correct size yet.
				send_resize();

				// Runs the "main loop".
				function do_main_update() {
					if (!e.main_update()) {
						e.main_end();

						// Calls procedures marked with @fini
						e._end();
						return;
					}
					window.requestAnimationFrame(do_main_update);
				}

				window.requestAnimationFrame(do_main_update);
			},
			print: (function() {
				var element = document.getElementById("output");
				if (element) element.value = ''; // clear browser cache
				return function(text) {
					if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
					console.log(text);
					if (element) {
					  element.value += text + "\n";
					  element.scrollTop = element.scrollHeight; // focus on bottom
					}
				};
			})(),
			canvas: (function() {
				return document.getElementById("canvas");
			})()
		};
	</script>

	<!-- Emscripten injects its javascript here -->
	{{{ SCRIPT }}}
</body>
</html>
