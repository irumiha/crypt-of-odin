name: Experiment - Windows static CRT

# The shipped Windows binary dynamically links VCRUNTIME140.dll (the Visual
# C++ redistributable), the one runtime dependency not guaranteed on a
# pristine Windows install. Static-linking the CRT would drop it and make the
# binary as self-contained as the Linux and macOS ones.
#
# The open question is whether that links cleanly against the prebuilt
# vendor:raylib.lib, which may itself have been built against the dynamic CRT
# and would then mismatch. This tries several linker-flag recipes and reports,
# for each: did it build, and what does dumpbin say the .exe now needs.
# Nothing is asserted. workflow_dispatch only.

on:
  workflow_dispatch: {}

jobs:
  static-crt:
    name: ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: baseline (dynamic CRT)
            flags: ""
          - name: static via libcmt + exclude msvcrt
            flags: "-extra-linker-flags:/NODEFAULTLIB:msvcrt.lib libcmt.lib"
          - name: static via libcmt only
            flags: "-extra-linker-flags:libcmt.lib"
    defaults:
      run:
        working-directory: code/ch17
    steps:
      - uses: actions/checkout@v7

      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: dev-2026-07

      - name: Build
        id: build
        shell: bash
        continue-on-error: true
        run: |
          if [ -n "${{ matrix.flags }}" ]; then
            ./build_desktop.sh -o:speed "${{ matrix.flags }}"
          else
            ./build_desktop.sh -o:speed
          fi

      - name: Report
        shell: pwsh
        run: |
          Write-Host "== build outcome: ${{ steps.build.outcome }} =="
          if (Test-Path crypt.exe) {
            $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
            $vs = & $vswhere -latest -property installationPath
            $dumpbin = Get-ChildItem "$vs\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" |
                       Select-Object -First 1 -ExpandProperty FullName
            Write-Host "== dumpbin /dependents crypt.exe =="
            & $dumpbin /dependents crypt.exe
            $has = (& $dumpbin /dependents crypt.exe | Select-String -Quiet "VCRUNTIME")
            Write-Host ""
            Write-Host "== VCRUNTIME140 still a dependency? $has =="
            Write-Host "== size: $((Get-Item crypt.exe).Length) bytes =="
          } else {
            Write-Host "no crypt.exe produced (build failed above)"
          }
